<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="display:inline-flex;align-items:center;gap:8px;">
  <div style="width:38px;height:22px;border-radius:20px;padding:2px;background:{{ trackColor }};display:flex;{{ justify }}">
    <div style="width:18px;height:18px;border-radius:50%;background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.2);"></div>
  </div>
  <span style="font:600 13px 'Hanken Grotesk',sans-serif;color:{{ labelColor }};">{{ label }}</span>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:130,&quot;height&quot;:30},&quot;avail&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const avail = this.props.avail ?? true;
    return {
      avail,
      label: avail ? 'Disponible' : 'Indisponible',
      trackColor: avail ? '#3E7D54' : '#D8CFBE',
      labelColor: avail ? '#3E7D54' : '#9C9081',
      justify: avail ? 'justify-content:flex-end;' : 'justify-content:flex-start;',
    };
  }
}
</script>
</body>
</html>
