<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<span style="display:inline-flex;align-items:center;gap:6px;font:600 11px 'Hanken Grotesk',sans-serif;color:{{ color }};background:{{ bg }};border-radius:20px;padding:4px 11px;">● {{ status }}</span>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:100,&quot;height&quot;:24},&quot;status&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;Vérifié&quot;,&quot;options&quot;:[&quot;Vérifié&quot;,&quot;En attente&quot;],&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const status = this.props.status ?? 'Vérifié';
    const verified = status === 'Vérifié';
    return {
      status,
      color: verified ? '#3E7D54' : '#A8762B',
      bg: verified ? '#E6F0E9' : '#F6EDD8',
    };
  }
}
</script>
</body>
</html>
