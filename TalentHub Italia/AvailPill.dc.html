<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<sc-if value="{{ avail }}" hint-placeholder-val="{{ true }}">
  <span style="display:inline-flex;align-items:center;gap:6px;font:600 11px 'Hanken Grotesk',sans-serif;color:#3E7D54;background:#E6F0E9;border-radius:20px;padding:4px 10px;">● Disponible</span>
</sc-if>
<sc-if value="{{ notAvail }}" hint-placeholder-val="{{ false }}">
  <span style="display:inline-flex;align-items:center;gap:6px;font:600 11px 'Hanken Grotesk',sans-serif;color:#9C9081;background:#F0ECE2;border-radius:20px;padding:4px 10px;">● Indisponible</span>
</sc-if>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:120,&quot;height&quot;:24},&quot;avail&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const avail = this.props.avail ?? true;
    return { avail, notAvail: !avail };
  }
}
</script>
</body>
</html>
